# Trivy filesystem scan defaults (used by aquasecurity/trivy-action with trivy-config).
# scan-type and scan-ref are set in the workflow; see https://github.com/aquasecurity/trivy-action#scan-ci-pipeline-w-trivy-config
format: table
exit-code: 1
severity: CRITICAL,HIGH
ignore-unfixed: true
scanners: vuln
