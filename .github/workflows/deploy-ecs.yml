# Build microservices into Docker images and push to ECR.
# Task definition updates and ECS deploy are done separately via: node scripts/deploy-task-definitions.js
#
# Microservices are read from .github/workflows/microservice.list (one name per line).
# ECR repository per service: onedelivery-<name>.
#
# --- GitHub configuration (Settings → Secrets and variables → Actions) ---
#
# REQUIRED (Secret): AWS_ROLE_ARN (IAM role for OIDC + ECR push)
# OPTIONAL (Variables): AWS_REGION (ap-southeast-1), ECS_CLUSTER (onedelivery-cluster)
#
name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'onedelivery-cluster' }}
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  run-tests:
    name: Run tests/checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (if present)
        run: npm run lint --workspaces --if-present

      - name: Build validation (if present)
        run: npm run build --workspaces --if-present

      - name: Run LangSmith evaluations (single-turn + multi-turn)
        if: ${{ secrets.EVAL_LANGSMITH_API_KEY != '' && secrets.EVAL_OPENAI_API_KEY != '' }}
        env:
          EVAL_LANGSMITH_API_KEY: ${{ secrets.EVAL_LANGSMITH_API_KEY }}
          EVAL_OPENAI_API_KEY: ${{ secrets.EVAL_OPENAI_API_KEY }}
        run: |
          # npm run test-orchestrator-agent
          npm run test-orchestrator-agent-multiturn
          # npm run test-logistics-agent
          # npm run test-resolution-agent

  build-and-push:
    name: Build and push to ECR
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push microservices
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          while IFS= read -r name || [[ -n "$name" ]]; do
            name=$(echo "$name" | tr -d '\r' | xargs)
            [[ -z "$name" ]] && continue
            repo="onedelivery-$name"
            echo "Building and pushing $name..."
            docker build -f .docker/Dockerfile.$name -t $ECR_REGISTRY/$repo:${{ env.IMAGE_TAG }} -t $ECR_REGISTRY/$repo:latest .
            docker push $ECR_REGISTRY/$repo:${{ env.IMAGE_TAG }}
            docker push $ECR_REGISTRY/$repo:latest
          done < .github/workflows/microservice.list

  notify-outcome:
    name: Notify outcome
    runs-on: ubuntu-latest
    needs: [run-tests, build-and-push]
    if: always()
    steps:
      - name: Pipeline result notification
        run: |
          if [[ "${{ needs.run-tests.result }}" != "success" ]]; then
            echo "CI checks failed."
            exit 1
          fi

          if [[ "${{ needs.build-and-push.result }}" != "success" ]]; then
            echo "Build/push failed."
            exit 1
          fi

          echo "Build, tests/checks, and push completed successfully."
