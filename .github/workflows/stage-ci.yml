name: Stage - CI

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read
  security-events: write
jobs:
  run-tests:
    name: Run tests/checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner (fs)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (if present)
        run: npm run lint --workspaces --if-present

      - name: Build validation (if present)
        run: npm run build --workspaces --if-present

  langsmith-eval:
    name: LangSmith — ${{ matrix.evaluation }}
    if: ${{ vars.ENABLE_LANGSMITH_EVALUATOR == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        evaluation:
          - test-orchestrator-agent
          # - test-orchestrator-agent-multiturn
          - test-logistics-agent
          - test-resolution-agent
          - test-qa-agent
          - test-qa-trends
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run evaluation
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run ${{ matrix.evaluation }}

  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: onedelivery
          path: .
          format: HTML
          out: owasp-report
          args: >-
            --enableRetired
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: owasp-report/

  # ---------------------------------------------------------------------------
  # SAST — Semgrep static analysis (TypeScript / Node.js rules)
  # Uploads SARIF to GitHub Security tab; never blocks the pipeline (continue-on-error).
  # ---------------------------------------------------------------------------
  sast-semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep CI
        run: semgrep ci --sarif --output semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  # ---------------------------------------------------------------------------
  # DAST — OWASP ZAP baseline scan
  # Runs only when DAST_TARGET_URL is set (point it at a staging deployment).
  # Uploads HTML/JSON report as an artifact; never blocks the pipeline.
  # ---------------------------------------------------------------------------
  dast-zap:
    name: DAST — OWASP ZAP Baseline
    runs-on: ubuntu-latest
    if: ${{ vars.DAST_TARGET_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.DAST_TARGET_URL }}
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a -j"
          fail_action: false
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: |
            report_html.html
            report_json.json

  # One analysis per module; each uses its own sonar-project.properties via projectBaseDir.
  # https://github.com/SonarSource/sonarqube-scan-action#projectbasedir
  sonar-scan:
    name: SonarQube — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/audit
          - apps/guardian-agent
          - apps/incident
          - apps/knowledge
          - apps/logistics
          - apps/logistics-agent
          # - apps/orchestrator-agent
          - apps/order
          - apps/payment
          - apps/qa-agent
          - apps/resolution-agent
          - apps/user
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report
        run: npm run test:coverage --workspace=${{ matrix.app }} --if-present

      - name: SonarQube scan (with retry)
        uses: nick-fields/retry@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker run --rm \
              -e SONAR_TOKEN \
              -e SONAR_HOST_URL=https://sonarcloud.io \
              -v "$GITHUB_WORKSPACE:/usr/src" \
              sonarsource/sonar-scanner-cli \
              -Dsonar.projectBaseDir=/usr/src/${{ matrix.app }}
