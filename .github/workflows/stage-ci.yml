name: Stage - CI

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  run-tests:
    name: Run tests/checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner (fs)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (if present)
        run: npm run lint --workspaces --if-present

      - name: Build validation (if present)
        run: npm run build --workspaces --if-present

  langsmith-eval:
    name: LangSmith — ${{ matrix.evaluation }}
    if: ${{ vars.ENABLE_LANGSMITH_EVALUATOR == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        evaluation:
          - test-orchestrator-agent
          # - test-orchestrator-agent-multiturn
          - test-logistics-agent
          - test-resolution-agent
          - test-qa-agent
          - test-qa-trends
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run evaluation
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run ${{ matrix.evaluation }}

  # One analysis per module; each uses its own sonar-project.properties via projectBaseDir.
  # https://github.com/SonarSource/sonarqube-scan-action#projectbasedir
  sonar-scan:
    name: SonarQube — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/audit
          - apps/guardian-agent
          - apps/incident
          - apps/knowledge
          - apps/logistics
          - apps/logistics-agent
          # - apps/orchestrator-agent
          - apps/order
          - apps/payment
          - apps/qa-agent
          - apps/resolution-agent
          - apps/user
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report
        run: npm run test:coverage --workspace=${{ matrix.app }} --if-present

      - name: SonarQube scan (with retry)
        uses: nick-fields/retry@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker run --rm \
              -e SONAR_TOKEN \
              -e SONAR_HOST_URL=https://sonarcloud.io \
              -v "$GITHUB_WORKSPACE:/usr/src" \
              sonarsource/sonar-scanner-cli \
              -Dsonar.projectBaseDir=/usr/src/${{ matrix.app }}
