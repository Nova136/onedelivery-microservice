name: Stage - CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-tests:
    name: Run tests/checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner (fs)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (if present)
        run: npm run lint --workspaces --if-present

      - name: Build validation (if present)
        run: npm run build --workspaces --if-present

      - name: Run LangSmith evaluations (single-turn + multi-turn)
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # npm run test-orchestrator-agent
          # npm run test-orchestrator-agent-multiturn
          # npm run test-logistics-agent
          npm run test-resolution-agent

      # - name: SonarCloud Scan
      #   uses: SonarSource/sonarqube-scan-action@v6
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
