name: Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI Stage
    uses: ./.github/workflows/stage-ci.yml
    secrets: inherit

  build:
    name: Build and Push Stage
    needs: ci
    uses: ./.github/workflows/stage-build-push.yml
    secrets: inherit

  deploy:
    name: Deploy Stage
    needs: build
    uses: ./.github/workflows/stage-deploy-ecs.yml
    secrets: inherit

  notify:
    name: Notify outcome
    runs-on: ubuntu-latest
    needs: [ci, build, deploy]
    if: always()
    steps:
      - name: Pipeline result notification
        run: |
          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "CI checks failed."
            exit 1
          fi

          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build/push failed."
            exit 1
          fi

          if [[ "${{ needs.deploy.result }}" != "success" ]]; then
            echo "ECS deploy failed."
            exit 1
          fi

          echo "All pipeline stages completed successfully."
