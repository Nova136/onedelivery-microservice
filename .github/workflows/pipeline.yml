name: Pipeline

# CI (lint, tests, Trivy): pull requests and every branch push.
# Build + deploy to stage: only when code lands on main (push after merge).
on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: read
  security-events: write
  actions: read
  issues: write

jobs:
  ci:
    name: CI Stage
    uses: ./.github/workflows/stage-ci.yml
    with:
      full_scan: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    secrets: inherit

  build:
    name: Build and Push Stage
    needs: ci
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/stage-build-push.yml
    secrets: inherit

  shadow:
    name: Shadow Deploy Stage
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/stage-deploy-shadow.yml
    secrets: inherit

  canary:
    name: Canary Deploy Stage
    needs: shadow
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/stage-deploy-canary.yml
    secrets: inherit

  deploy:
    name: Full Deploy Stage
    needs: canary
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/stage-deploy-ecs.yml
    secrets: inherit

  notify:
    name: Notify outcome
    runs-on: ubuntu-latest
    needs: [ci, build, shadow, canary, deploy]
    if: always()
    defaults:
      run:
        shell: bash
    steps:
      - name: Pipeline result notification
        env:
          CI_RESULT: ${{ needs.ci.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          SHADOW_RESULT: ${{ needs.shadow.result }}
          CANARY_RESULT: ${{ needs.canary.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          IS_MAIN_RELEASE: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        run: |
          if [[ "$CI_RESULT" != "success" ]]; then
            echo "CI checks failed."
            exit 1
          fi

          if [[ "$IS_MAIN_RELEASE" != "true" ]]; then
            echo "CI completed successfully (build/deploy only runs on push to main or workflow_dispatch on main)."
            exit 0
          fi

          if [[ "$BUILD_RESULT" != "success" ]]; then
            echo "Build/push failed."
            exit 1
          fi

          if [[ "$SHADOW_RESULT" != "success" ]]; then
            echo "Shadow deployment failed."
            exit 1
          fi

          if [[ "$CANARY_RESULT" != "success" ]]; then
            echo "Canary deployment failed or was rolled back."
            exit 1
          fi

          if [[ "$DEPLOY_RESULT" != "success" ]]; then
            echo "Full ECS deploy failed."
            exit 1
          fi

          echo "All pipeline stages completed successfully."
