name: Stage - Deploy ECS

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'onedelivery-cluster' }}

jobs:
  prepare-matrix:
    name: Prepare microservice matrix
    runs-on: ${{ vars.USE_SELF_HOSTED_RUNNER == 'true' && fromJson('["self-hosted", "Windows"]') || 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    outputs:
      microservices: ${{ steps.matrix.outputs.microservices }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrix from microservice.list
        id: matrix
        run: |
          matrix_json=$(jq -R -s -c 'split("\n") | map(gsub("\r";"") | gsub("^\\s+|\\s+$";"")) | map(select(length > 0))' .github/workflows/microservice.list)
          echo "microservices=$matrix_json" >> "$GITHUB_OUTPUT"

  deploy-ecs:
    name: Force deploy ECS services
    needs: prepare-matrix
    runs-on: ${{ vars.USE_SELF_HOSTED_RUNNER == 'true' && fromJson('["self-hosted", "Windows"]') || 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        microservice: ${{ fromJson(needs.prepare-matrix.outputs.microservices) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ matrix.microservice }} \
            --force-new-deployment \
            --no-cli-pager
