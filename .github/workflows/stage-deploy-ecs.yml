name: Stage - Deploy ECS

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'onedelivery-cluster' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  prepare-matrix:
    name: Prepare microservice matrix
    runs-on: ubuntu-latest
    outputs:
      microservices: ${{ steps.matrix.outputs.microservices }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrix from microservice.list
        id: matrix
        run: |
          matrix_json=$(jq -R -s -c 'split("\n") | map(gsub("\r";"") | gsub("^\\s+|\\s+$";"")) | map(select(length > 0))' .github/workflows/microservice.list)
          echo "microservices=$matrix_json" >> "$GITHUB_OUTPUT"

  deploy-ecs:
    name: Deploy ECS task definitions
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        microservice: ${{ fromJson(needs.prepare-matrix.outputs.microservices) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download existing task definition
        run: |
          mkdir -p .github/workflows/generated-task-definitions
          aws ecs describe-task-definition \
            --task-definition "onedelivery-${{ matrix.microservice }}" \
            --query taskDefinition > .github/workflows/generated-task-definitions/${{ matrix.microservice }}.json

      - name: Set image URI
        id: build-image
        env:
          MICROSERVICE_NAME: ${{ matrix.microservice }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          echo "image=$ECR_REGISTRY/onedelivery-$MICROSERVICE_NAME:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .github/workflows/generated-task-definitions/${{ matrix.microservice }}.json
          container-name: ${{ matrix.microservice }}
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            DATABASE_URL=${{ secrets.DATABASE_URL || vars.DATABASE_URL || '' }}
            JWT_SECRET=${{ secrets.JWT_SECRET || vars.JWT_SECRET || '' }}
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL || vars.RABBITMQ_URL || '' }}
            CORS_ORIGIN=${{ vars.CORS_ORIGIN || '*' }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD || vars.DB_PASSWORD || 'postgres' }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ matrix.microservice }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
