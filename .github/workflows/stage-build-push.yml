name: Stage - Build and Push

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push microservices
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          get_port() {
            case "$1" in
              audit) echo "9001" ;;
              logistics) echo "9002" ;;
              order) echo "9003" ;;
              payment) echo "9004" ;;
              user) echo "9005" ;;
              incident) echo "9006" ;;
              knowledge) echo "9007" ;;
              orchestrator-agent) echo "9010" ;;
              logistics-agent) echo "9011" ;;
              resolution-agent) echo "9012" ;;
              guardian-agent) echo "9013" ;;
              qa-agent) echo "9014" ;;
              *) echo "80" ;;
            esac
          }

          while IFS= read -r name || [[ -n "$name" ]]; do
            name=$(echo "$name" | tr -d '\r' | xargs)
            [[ -z "$name" ]] && continue
            repo="onedelivery-$name"
            port="$(get_port "$name")"
            echo "Building and pushing $name..."
            docker buildx build \
              --platform linux/amd64 \
              --progress=plain \
              --file .docker/Dockerfile.template \
              --build-arg SERVICE_NAME="$name" \
              --build-arg EXPOSE_PORT="$port" \
              --cache-from type=gha \
              --cache-to type=gha,mode=min \
              --provenance=false \
              --sbom=false \
              --tag $ECR_REGISTRY/$repo:${{ env.IMAGE_TAG }} \
              --tag $ECR_REGISTRY/$repo:latest \
              --push \
              .
          done < .github/workflows/microservice.list
