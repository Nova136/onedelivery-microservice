# Local dev stack: Postgres, RabbitMQ (event bus), LocalStack (S3 + SNS), Kong (API gateway).
# Run: docker compose up -d
# See .env.example for variables.
#
# Gateway: Kong listens on 8000 (proxy). Point the frontend to http://localhost:8000 .
# Routes: /order -> order:3001, /logistics -> logistics:3002, /payment -> payment:3003, /audit -> audit:3004, /user -> user:3005
# (Microservices run on host via npm run start:all; Kong uses host.docker.internal.)

services:
  kong:
    image: kong:3.6
    container_name: onedelivery-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"   # Proxy (frontend points here)
      - "${KONG_ADMIN_PORT:-8001}:8001"   # Admin API (optional)
    volumes:
      - ./scripts/kong/kong.yml:/usr/local/kong/kong.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  database:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-onedelivery}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-onedelivery}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: onedelivery-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"   # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  localstack:
    image: localstack/localstack:3.6
    container_name: onedelivery-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3,sns
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      PERSISTENCE: 1
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566" # Gateway
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

volumes:
  postgres_data:
  rabbitmq_data:
  localstack_data:

networks:
  backend:
    driver: bridge
