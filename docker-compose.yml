# Local dev stack: Postgres, RabbitMQ (event bus), LocalStack (S3 + SNS + DynamoDB), Kong (API gateway),
# ws-gateway (WebSocket gateway — local replacement for Lambda + API Gateway WebSocket).
# Run: docker compose up -d
# See .env.example for variables.
#
# Gateway: Kong listens on 8000 (proxy). Point the frontend to http://localhost:8000 .
# HTTP routes: /order -> order:3001, /logistics -> logistics:3002, etc. (services run on host via npm run start:all)
# WebSocket:   ws://localhost:8000/ws  →  ws-gateway:3015
# (Microservices run on host via npm run start:all; Kong uses host.docker.internal.)

services:
  kong:
    image: kong:3.6
    container_name: onedelivery-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"   # Proxy (frontend points here)
      - "${KONG_ADMIN_PORT:-8001}:8001"   # Admin API (optional)
    volumes:
      - ./scripts/kong/kong.yml:/usr/local/kong/kong.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  database:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-onedelivery}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-onedelivery}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:alpine
    restart: unless-stopped
    hostname: redis
    ports:
      - '6379:6379'
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: onedelivery-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"   # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  localstack:
    image: localstack/localstack:3.6
    container_name: onedelivery-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3,sns
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      PERSISTENCE: 1
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566" # Gateway
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  # Local replacement for Lambda + API Gateway WebSocket.
  # Handles $connect (JWT auth + rate limit), sendMessage → RabbitMQ, $disconnect.
  # Exposes POST /connections/:connectionId for orchestrator-agent push-back.
  # Set WEBSOCKET_API_ENDPOINT=http://ws-gateway:3015 in orchestrator-agent .env for local dev.
  ws-gateway:
    build:
      context: ./scripts/ws-gateway
      dockerfile: Dockerfile
    container_name: onedelivery-ws-gateway
    restart: unless-stopped
    environment:
      WS_PORT: 3015
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@database:5432/${DB_NAME:-onedelivery}
      JWT_SECRET: ${JWT_SECRET:-ffa32c3d40342bec6c1bcfba7b4f8197}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rabbit}:${RABBITMQ_PASSWORD:-rabbit}@rabbitmq:5672
      ORCHESTRATOR_QUEUE: ${RABBITMQ_ORCHESTRATOR_AGENT_QUEUE:-orchestrator_agent_queue}
      ALLOWED_ROLES: ${WS_ALLOWED_ROLES:-User,Admin}
      RATE_LIMIT_PER_MINUTE: ${WS_RATE_LIMIT_PER_MINUTE:-20}
    ports:
      - "${WS_GATEWAY_PORT:-3015}:3015"
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3015/health', r => process.exit(r.statusCode === 404 ? 0 : 0)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

volumes:
  postgres_data:
  rabbitmq_data:
  localstack_data:

networks:
  backend:
    driver: bridge
