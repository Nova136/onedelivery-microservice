      - DB_HOST=postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-onedelivery}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-rabbit}:${RABBITMQ_PASSWORD:-rabbit}@rabbitmq:5672 #gitleaks:allow
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    networks:
