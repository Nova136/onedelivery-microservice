# Debug stack: microservices + agents using Postgres (and RabbitMQ) from docker-compose.yml.
# Start the main stack first: docker compose up -d
# Then: docker compose -f docker-compose.debug.yml up --build
# Ports: 3001 audit, 3002 logistics, 3003 order, 3004 payment, 3005 user, 3006 incident; 3010 orchestrator-agent, 3011 logistics-agent, 3012 resolution-agent, 3013 guardian-agent, 3014 qa-agent.
services:
  # Host:container = 300x:900x so Kong (host.docker.internal:300x) matches.
  order:
    build:
      context: .
      dockerfile: .docker/Dockerfile.template
      args:
        SERVICE_NAME: order
        EXPOSE_PORT: 9003
    restart: unless-stopped
    hostname: order
    ports:
      - '3003:9003'
    env_file:
      - .env
    environment:
      - ORDER_PORT=9003
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=onedelivery
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-onedelivery}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-rabbit}:${RABBITMQ_PASSWORD:-rabbit}@rabbitmq:5672 #gitleaks:allow
    networks:
      - backend
  logistics:
