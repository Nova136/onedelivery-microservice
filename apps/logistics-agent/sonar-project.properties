sonar.projectKey=nova136_onedelivery-logistics-agent
sonar.organization=nova136
sonar.projectName=Logistics Agent
sonar.projectVersion=1.0
# Use the app tsconfig so the scanner does not synthesize a wildcard tsconfig (heavy on monorepos).
sonar.typescript.tsconfigPath=tsconfig.app.json
# MB for Node heap used by the JS/TS bridge (raise if analysis still OOMs locally/CI).
sonar.javascript.node.maxspace=6144

sonar.sources=./src
sonar.tests=./src
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.exclusions=node_modules/**,dist/**,scripts/**
