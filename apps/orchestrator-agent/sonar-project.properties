sonar.projectKey=nova136_onedelivery-orchestrator-agent
sonar.organization=nova136
sonar.projectName=Orchestrator Agent
sonar.projectVersion=1.0
sonar.branch.name=master
#
# This app imports @langchain/* and @langchain/langgraph; the TS bridge loads huge type graphs from
# node_modules. Raising heap alone often still OOMs — use tsconfig.sonar.json (no root extends, only
# @libs paths) so we do not merge repo-wide path mappings. Locally, if needed: -Dsonar.javascript.node.maxspace=12288
# CI: keep ≤4096 on github-hosted or use a larger runner for this module.
sonar.javascript.node.maxspace=12288
sonar.typescript.tsconfigPath=tsconfig.app.json

sonar.sources=./src
sonar.tests=./src
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
# Exclude LangSmith / eval scripts under apps/orchestrator-agent/scripts/ (paths relative to this module root).
sonar.exclusions=node_modules/**,dist/**,scripts/**
sonar.coverage.exclusions=scripts/**
