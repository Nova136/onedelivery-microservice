# Kong DB-less declarative config. Gateway for local dev.
# Frontend and clients call http://localhost:8000/<service>/... ; Kong strips the prefix and proxies to the microservice.
# Debug Docker stack maps 3001:9001 (audit), 3002:9002 (logistics), 3003:9003 (order), 3004:9004 (payment), 3005:9005 (user), 3006:9006 (incident).
# Agents: 3010 orchestrator-agent, 3011 logistics-agent, 3012 resolution-agent, 3013 guardian-agent, 3014 qa-agent.
# Kong uses host.docker.internal:300x to reach the service on the host.
#
# WebSocket: ws://localhost:8000/ws?token=<JWT>  → ws-gateway:3015 (Kong proxies WS transparently over HTTP)

_format_version: "3.0"

# Global CORS so browser requests from e.g. http://localhost:5173 are allowed
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - token
        - owner
      credentials: true
      exposed_headers: []
      max_age: 3600

services:
  - name: order
    url: http://host.docker.internal:3003
    routes:
      - name: order-route
        paths: ["/order"]
        strip_path: false

  - name: logistics
    url: http://host.docker.internal:3002
    routes:
      - name: logistics-route
        paths: ["/logistics"]
        strip_path: false

  - name: payment
    url: http://host.docker.internal:3004
    routes:
      - name: payment-route
        paths: ["/payment"]
        strip_path: false

  - name: audit
    url: http://host.docker.internal:3001
    routes:
      - name: audit-route
        paths: ["/audit"]
        strip_path: false

  - name: user
    url: http://host.docker.internal:3005
    routes:
      - name: user-route
        paths: ["/user"]
        strip_path: false

  - name: incident
    url: http://host.docker.internal:3006
    routes:
      - name: incident-route
        paths: ["/incident"]
        strip_path: false

  - name: knowledge
    url: http://host.docker.internal:3007
    routes:
      - name: knowledge-route
        paths: ["/knowledge"]
        strip_path: false

  - name: orchestrator-agent
    url: http://host.docker.internal:3010
    routes:
      - name: orchestrator-agent-route
        paths: ["/orchestrator-agent"]
        strip_path: false

  - name: guardian-agent
    url: http://host.docker.internal:3013
    routes:
      - name: guardian-agent-route
        paths: ["/guardian-agent"]
        strip_path: false

  - name: logistics-agent
    url: http://host.docker.internal:3011
    routes:
      - name: logistics-agent-route
        paths: ["/logistics-agent"]
        strip_path: false

  - name: resolution-agent
    url: http://host.docker.internal:3012
    routes:
      - name: resolution-agent-route
        paths: ["/resolution-agent"]
        strip_path: false

  - name: qa-agent
    url: http://host.docker.internal:3014
    routes:
      - name: qa-agent-route
        paths: ["/qa-agent"]
        strip_path: false

  # WebSocket chat gateway (local replacement for Lambda + API Gateway WebSocket).
  # Clients connect with:  ws://localhost:8000/ws?token=<JWT>[&sessionId=<id>]
  # Kong proxies the WebSocket upgrade to ws-gateway:3015 and strips the /ws prefix.
  - name: ws-gateway
    url: http://ws-gateway:3015
    routes:
      - name: ws-gateway-route
        paths: ["/ws"]
        strip_path: true
        protocols:
          - http
          - https
