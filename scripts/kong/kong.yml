# Kong DB-less declarative config. Gateway for local dev.
# Frontend and clients call http://localhost:8000/<service>/... ; Kong strips the prefix and proxies to the microservice.
# Debug Docker stack maps 3001:9001 (order), 3002:9002 (logistics), 3003:9003 (payment), 3004:9004 (audit), 3005:9005 (user).
# Kong uses host.docker.internal:300x to reach the service on the host.

_format_version: "3.0"

# Global CORS so browser requests from e.g. http://localhost:5173 are allowed
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - token
        - owner
      credentials: true
      exposed_headers: []
      max_age: 3600

services:
  - name: order
    url: http://host.docker.internal:3003
    routes:
      - name: order-route
        paths: ["/order"]
        strip_path: false

  - name: logistics
    url: http://host.docker.internal:3002
    routes:
      - name: logistics-route
        paths: ["/logistics"]
        strip_path: false

  - name: payment
    url: http://host.docker.internal:3004
    routes:
      - name: payment-route
        paths: ["/payment"]
        strip_path: false

  - name: audit
    url: http://host.docker.internal:3001
    routes:
      - name: audit-route
        paths: ["/audit"]
        strip_path: false

  - name: user
    url: http://host.docker.internal:3005
    routes:
      - name: user-route
        paths: ["/user"]
        strip_path: false

  - name: incident
    url: http://host.docker.internal:3006
    routes:
      - name: incident-route
        paths: ["/incident"]
        strip_path: false
